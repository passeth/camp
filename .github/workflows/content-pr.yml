name: Content PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "content/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate content PR
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate changed content scope and frontmatter
        run: node scripts/validate-content-pr.mjs "origin/${{ github.base_ref }}" HEAD
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build

  auto-merge:
    name: Auto merge trusted content PR
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      ${{
        needs.validate.result == 'success' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        startsWith(github.event.pull_request.head.ref, 'content/')
      }}
    steps:
      - name: Merge content PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR_NUMBER" --squash --delete-branch --subject "Publish Camp content PR #$PR_NUMBER"
